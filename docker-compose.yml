services:

  nginx:
    image: nginx:alpine
    container_name: requestforge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

  api:
    build: .
    container_name: requestforge-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  redis:
    image: redis:7-alpine
    container_name: requestforge-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
